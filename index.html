<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Guardian - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; background-color: #020617; color: white; font-family: sans-serif; }
      .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; animation: scan 3s infinite linear; pointer-events: none; z-index: 100; }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      .loading-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #3b82f6; font-family: monospace; }
    </style>
  </head>
  <body>
    <div id="root"><div class="loading-screen text-xl animate-pulse">AI SIGNAL GUARDIAN 起動中...</div></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;
      
      // Rechartsの部品を安全に取り出す
      const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

      const App = () => {
        const [data, setData] = useState([]);
        const [isLive, setIsLive] = useState(false);

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
          
          const interval = setInterval(() => {
            fetch('http://127.0.0.1:5000/api/stats')
              .then(res => res.json())
              .then(stats => {
                setIsLive(true);
                setData(prev => {
                  const newData = [...prev, { time: new Date().toLocaleTimeString(), ...stats }];
                  return newData.slice(-20);
                });
              })
              .catch(() => setIsLive(false));
          }, 1000);
          return () => clearInterval(interval);
        }, []);

        return (
          <div className="min-h-screen p-4 md:p-8 relative">
            <div className="scan-line"></div>
            <header className="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
              <h1 className="text-2xl font-bold text-blue-500 flex items-center gap-2 italic">
                <i data-lucide="shield"></i> AI Signal Guardian
              </h1>
              <div className={`text-xs font-mono px-3 py-1 rounded-full border ${isLive ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500 animate-pulse'}`}>
                {isLive ? '● LIVE: データ受信中' : '○ OFFLINE: 放送局未検出'}
              </div>
            </header>

            <div className="bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-2xl">
              <h2 className="text-lg font-semibold mb-6 flex items-center gap-2 text-blue-400">
                <i data-lucide="activity"></i> リアルタイム・トラフィックモニター
              </h2>
              <div style={{ width: '100%', height: 350 }}>
                <ResponsiveContainer>
                  <AreaChart data={data}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                    <XAxis dataKey="time" stroke="#64748b" fontSize={10} />
                    <YAxis stroke="#64748b" />
                    <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155' }} />
                    <Area type="monotone" dataKey="upload" stroke="#ef4444" fill="#ef4444" fillOpacity={0.1} name="送信" isAnimationActive={false} />
                    <Area type="monotone" dataKey="download" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.1} name="受信" isAnimationActive={false} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
            
            <div className="mt-8 p-4 bg-blue-900/10 border border-blue-500/20 rounded text-center">
               <p className="text-blue-400 text-xs font-mono tracking-widest uppercase">
                 Local Sensor at 127.0.0.1 is Monitoring your Network
               </p>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
