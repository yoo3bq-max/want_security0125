<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Guardian - Stealth Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; padding: 0; background-color: #020617; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
      .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; left: 0; animation: scan 3s infinite linear; box-shadow: 0 0 15px #3b82f6; z-index: 10; pointer-events: none; }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { Shield, AlertTriangle, Activity, Smartphone, Send, CheckCircle2, Lock, Globe, Search, Database, Radio } = lucide;
      const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Line } = Recharts;

      const trafficData = [
        { time: '11:00', upload: 1.2, download: 5.5 },
        { time: '11:05', upload: 2.5, download: 6.2 },
        { time: '11:10', upload: 28.5, download: 3.1 }, // 異常値: キャッシュ流出を想定
        { time: '11:15', upload: 32.2, download: 2.8 },
        { time: '11:20', upload: 15.5, download: 4.2 },
        { time: '11:25', upload: 1.4, download: 5.9 },
      ];

      function App() {
        const [isScanning, setIsScanning] = useState(true);
        const [reporting, setReporting] = useState(null);
        const [reportSuccess, setReportSuccess] = useState(false);

        useEffect(() => {
          const timer = setTimeout(() => setIsScanning(false), 3000);
          return () => clearTimeout(timer);
        }, []);

        const handleAction = (target) => {
          setReporting(target);
          setTimeout(() => {
            setReporting(null);
            setReportSuccess(true);
            setTimeout(() => setReportSuccess(false), 3000);
          }, 2000);
        };

        return (
          <div className="min-h-screen p-4 md:p-8">
            {isScanning && <div className="scan-line"></div>}

            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
              <div>
                <h1 className="text-3xl font-bold flex items-center gap-3 text-blue-500 italic">
                  <Shield size={36} /> AI Signal Guardian
                </h1>
                <p className="text-slate-400 mt-1 font-mono">集合住宅用ステルス監視・防御システム</p>
              </div>
              <div className="bg-slate-900 px-4 py-2 rounded-full border border-blue-500/50 text-blue-400 flex items-center gap-2">
                <Radio size={16} className="animate-ping" />
                <span className="text-xs font-bold uppercase tracking-widest">Active Monitoring</span>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                {/* 1. スキャナ・トラフィック解析 */}
                <div className="bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-2xl relative overflow-hidden">
                  <h2 className="text-xl font-semibold mb-6 flex items-center gap-2 text-blue-400">
                    <Search size={22} /> キャッシュ・履歴流出スキャナー
                  </h2>
                  <div style={{ width: '100%', height: 300 }}>
                    <ResponsiveContainer>
                      <AreaChart data={trafficData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                        <XAxis dataKey="time" stroke="#64748b" />
                        <YAxis stroke="#64748b" />
                        <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155' }} />
                        <Area type="monotone" dataKey="upload" stroke="#ef4444" fill="#ef4444" fillOpacity={0.1} name="流出疑い(Mbps)" />
                        <Line type="monotone" dataKey="download" stroke="#3b82f6" strokeWidth={2} name="正常通信" />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="mt-4 p-4 bg-red-950/40 border border-red-500/50 rounded-lg animate-pulse">
                    <p className="text-red-400 text-sm flex items-center gap-2 font-bold">
                      <AlertTriangle size={18} /> ステルス監視検知: 外部IP 45.xx.xx.12 があなたのブラウザキャッシュを同期しています
                    </p>
                  </div>
                </div>

                {/* 2. 防御・遮断アクション */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                    <h3 className="font-bold mb-4 flex items-center gap-2 text-green-400"><Database size={18} /> デバイス保護状態</h3>
                    <div className="space-y-3">
                      <div className="p-3 bg-red-900/10 border border-red-500/30 rounded flex justify-between items-center">
                        <span className="text-xs">履歴同期フラグ</span>
                        <span className="text-red-500 font-bold px-2 py-0.5 bg-red-500/20 rounded">UNSECURED</span>
                      </div>
                      <button 
                        onClick={() => handleAction('defense')}
                        className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold transition-all text-sm"
                      >
                        全履歴・キャッシュを物理遮断する
                      </button>
                    </div>
                  </div>
                  <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                    <h3 className="font-bold mb-4 flex items-center gap-2 text-purple-400"><Globe size={18} /> 攻撃元IP解析</h3>
                    <div className="text-[10px] space-y-2 font-mono">
                      <div className="flex justify-between border-b border-slate-800 py-1">
                        <span>SOURCE: Unknown Server</span><span className="text-red-500 uppercase">Alert</span>
                      </div>
                      <div className="flex justify-between border-b border-slate-800 py-1">
                        <span>STATUS: Tracking Cache</span><span className="text-red-500 italic">Connected</span>
                      </div>
                      <p className="text-slate-500 mt-2">※集合住宅内共有ルーター経由の侵入を確認</p>
                    </div>
                  </div>
                </div>
              </div>

              {/* 3. 外部機関連報 (Signal送信) */}
              <div className="space-y-6">
                <div className="bg-slate-900 rounded-xl p-6 border border-blue-500/30 shadow-blue-500/10 shadow-xl">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-blue-400">
                    <Send size={20} /> 注意喚起シグナル送信
                  </h2>
                  <div className="space-y-3">
                    {[
                      { id: 'carrier', label: '大手キャリア (KDDI/NTT等)', sub: '通信網レベルの遮断依頼' },
                      { id: 'sec', label: 'サイバーセキュリティ会社', sub: 'フォレンジック解析依頼' },
                      { id: 'bld', label: '建物管理・サーバー会社', sub: '共有Wi-Fi脆弱性報告' }
                    ].map((item) => (
                      <button 
                        key={item.id}
                        onClick={() => handleAction(item.id)}
                        disabled={reporting}
                        className="w-full text-left p-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-all group"
                      >
                        <div className="flex justify-between items-center">
                          <span className="text-sm font-bold">{item.label}</span>
                          <Send size={14} className="text-slate-500 group-hover:text-blue-400" />
                        </div>
                        <p className="text-[10px] text-slate-500 mt-1">{item.sub}</p>
                      </button>
                    ))}
                  </div>

                  {reporting && (
                    <div className="mt-4 p-3 bg-blue-500/10 border border-blue-500/50 rounded animate-pulse text-center">
                      <span className="text-xs text-blue-400 font-bold">Encrypted Signal Sending...</span>
                    </div>
                  )}
                  {reportSuccess && (
                    <div className="mt-4 p-3 bg-green-500/20 border border-green-500/50 rounded text-center">
                      <div className="flex items-center justify-center gap-2 text-green-400 text-sm font-bold">
                        <CheckCircle2 size={16} /> シグナル送信完了
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                  <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">System Log</h3>
                  <div className="text-[9px] font-mono text-slate-400 space-y-1">
                    <p>[11:31:02] Firewall Layer-7 checking...</p>
                    <p>[11:31:05] Suspicious cache sync detected.</p>
                    <p className="text-red-500 underline">[11:31:08] CRITICAL: Device identity leached.</p>
                  </div>
                </div>
              </div>
            </div>

            <footer className="mt-8 pt-6 border-t border-slate-800 text-center text-slate-600 text-[10px] font-mono tracking-tighter">
              © 2026 AI SIGNAL GUARDIAN // COLLECTIVE HOUSING DEFENSE PROTOCOL // ISO-27001 COMPLIANT
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
