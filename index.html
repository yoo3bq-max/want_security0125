<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Guardian - Stealth Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; background-color: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
      .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; animation: scan 3s infinite linear; box-shadow: 0 0 15px #3b82f6; z-index: 50; pointer-events: none; }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      .loading-text { display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #3b82f6; font-family: monospace; animation: pulse 2s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-text">セキュアプロトコルを確立中...</div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const App = () => {
        const [isReady, setIsReady] = useState(false);
        const [isScanning, setIsScanning] = useState(true);
        const [reporting, setReporting] = useState(null);
        const [reportSuccess, setReportSuccess] = useState(false);

        // ライブラリの準備ができるまで監視する
        useEffect(() => {
          const checkLibs = setInterval(() => {
            if (window.Recharts && window.lucide) {
              setIsReady(true);
              clearInterval(checkLibs);
              window.lucide.createIcons();
              setTimeout(() => setIsScanning(false), 3000);
            }
          }, 500);
          return () => clearInterval(checkLibs);
        }, []);

        if (!isReady) {
          return <div className="loading-text">AI SIGNAL GUARDIAN: 依存関係を検証中...</div>;
        }

        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Line } = window.Recharts;
        const { Shield, AlertTriangle, Activity, Smartphone, Send, CheckCircle2, Lock, Globe, Search, Database, Radio } = window.lucide;

        const trafficData = [
          { time: '12:00', upload: 1.2, download: 5.5 },
          { time: '12:05', upload: 2.5, download: 6.2 },
          { time: '12:10', upload: 28.5, download: 3.1 },
          { time: '12:15', upload: 32.2, download: 2.8 },
          { time: '12:20', upload: 15.5, download: 4.2 },
          { time: '12:25', upload: 1.4, download: 5.9 },
        ];

        const handleAction = (target) => {
          setReporting(target);
          setTimeout(() => {
            setReporting(null);
            setReportSuccess(true);
            setTimeout(() => setReportSuccess(false), 3000);
          }, 2000);
        };

        return (
          <div className="min-h-screen p-4 md:p-8">
            {isScanning && <div className="scan-line"></div>}
            
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-800 pb-6">
              <div>
                <h1 className="text-3xl font-bold flex items-center gap-3 text-blue-500">
                  <i data-lucide="shield" style={{width: 36, height: 36}}></i> AI Signal Guardian
                </h1>
                <p className="text-slate-400 mt-1 font-mono text-sm">集合住宅 Wi-Fi ステルス攻撃検知システム</p>
              </div>
              <div className="bg-slate-900 px-4 py-2 rounded-full border border-blue-500/50 text-blue-400 flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                <i data-lucide="radio" className="animate-ping" style={{width: 14, height: 14}}></i> System Active
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                <div className="bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-2xl relative">
                  <h2 className="text-xl font-semibold mb-6 flex items-center gap-2 text-blue-400">
                    <i data-lucide="search"></i> キャッシュ流出・履歴同期 解析
                  </h2>
                  <div style={{ width: '100%', height: 300 }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <AreaChart data={trafficData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                        <XAxis dataKey="time" stroke="#64748b" />
                        <YAxis stroke="#64748b" />
                        <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155' }} />
                        <Area type="monotone" dataKey="upload" stroke="#ef4444" fill="#ef4444" fillOpacity={0.1} name="異常アップロード" />
                        <Line type="monotone" dataKey="download" stroke="#3b82f6" strokeWidth={2} name="通常通信" />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="mt-4 p-4 bg-red-950/40 border border-red-500/50 rounded-lg">
                    <p className="text-red-400 text-sm flex items-center gap-2 font-bold animate-pulse">
                      <i data-lucide="alert-triangle"></i> ステルス接続を検知: 攻撃者があなたの履歴データを抽出しています
                    </p>
                  </div>
                </div>

                <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                  <h3 className="font-bold mb-4 flex items-center gap-2 text-green-400"><i data-lucide="database"></i> 防御アクション</h3>
                  <button onClick={() => handleAction('defense')} className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-all shadow-lg shadow-blue-900/20">
                    攻撃元の接続を強制切断し、全データを暗号化保護
                  </button>
                </div>
              </div>

              <div className="space-y-6">
                <div className="bg-slate-800/30 rounded-xl p-6 border border-blue-500/20">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-blue-400"><i data-lucide="send"></i> 注意喚起シグナル送信</h2>
                  <div className="space-y-3">
                    {['KDDI/NTT/キャリア', 'サイバーセキュリティ機関', '建物管理会社'].map((name) => (
                      <button key={name} onClick={() => handleAction(name)} disabled={reporting} className="w-full text-left p-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-lg text-xs font-bold flex justify-between items-center group transition-all">
                        <span>{name} へ通報</span>
                        <i data-lucide="send" className="w-3 h-3 text-slate-500 group-hover:text-blue-400"></i>
                      </button>
                    ))}
                  </div>
                  {reportSuccess && <div className="mt-4 p-3 bg-green-500/20 border border-green-500/50 rounded text-green-400 text-xs text-center font-bold animate-bounce tracking-widest">SIGNAL DISPATCHED</div>}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
