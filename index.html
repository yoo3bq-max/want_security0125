<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Guardian - Stealth Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; background-color: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
      .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; animation: scan 3s infinite linear; box-shadow: 0 0 15px #3b82f6; z-index: 50; pointer-events: none; }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <script type="text/babel">
      const { useState, useEffect } = React;
      // Rechartsが確実に読み込まれてから分割代入
      const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Line } = window.Recharts || {};
      const { Shield, AlertTriangle, Activity, Smartphone, Send, CheckCircle2, Lock, Globe, Search, Database, Radio } = window.lucide || {};

      const trafficData = [
        { time: '11:00', upload: 1.2, download: 5.5 },
        { time: '11:05', upload: 2.5, download: 6.2 },
        { time: '11:10', upload: 28.5, download: 3.1 },
        { time: '11:15', upload: 32.2, download: 2.8 },
        { time: '11:20', upload: 15.5, download: 4.2 },
        { time: '11:25', upload: 1.4, download: 5.9 },
      ];

      function App() {
        const [isScanning, setIsScanning] = useState(true);
        const [reporting, setReporting] = useState(null);
        const [reportSuccess, setReportSuccess] = useState(false);

        useEffect(() => {
          setTimeout(() => setIsScanning(false), 3000);
          if (window.lucide) window.lucide.createIcons();
        }, []);

        const handleAction = (target) => {
          setReporting(target);
          setTimeout(() => {
            setReporting(null);
            setReportSuccess(true);
            setTimeout(() => setReportSuccess(false), 3000);
          }, 2000);
        };

        if (!window.Recharts) return <div className="p-10 text-red-500">Loading Error: Recharts not found. Please refresh.</div>;

        return (
          <div className="min-h-screen p-4 md:p-8">
            {isScanning && <div className="scan-line"></div>}
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
              <div>
                <h1 className="text-3xl font-bold flex items-center gap-3 text-blue-500 italic">
                  <Shield size={36} /> AI Signal Guardian
                </h1>
                <p className="text-slate-400 mt-1 font-mono text-sm">ステルス監視検知・防御プロトコル</p>
              </div>
              <div className="bg-slate-900 px-4 py-2 rounded-full border border-blue-500/50 text-blue-400 flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                <Radio size={14} className="animate-ping" /> Active Monitoring
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                <div className="bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-2xl relative">
                  <h2 className="text-xl font-semibold mb-6 flex items-center gap-2 text-blue-400">
                    <Search size={22} /> キャッシュ流出リアルタイム解析
                  </h2>
                  <div style={{ width: '100%', height: 300 }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <AreaChart data={trafficData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                        <XAxis dataKey="time" stroke="#64748b" />
                        <YAxis stroke="#64748b" />
                        <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155' }} />
                        <Area type="monotone" dataKey="upload" stroke="#ef4444" fill="#ef4444" fillOpacity={0.1} name="流出疑い" />
                        <Line type="monotone" dataKey="download" stroke="#3b82f6" strokeWidth={2} name="正常通信" />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="mt-4 p-4 bg-red-950/40 border border-red-500/50 rounded-lg">
                    <p className="text-red-400 text-sm flex items-center gap-2 font-bold animate-pulse">
                      <AlertTriangle size={18} /> ステルス監視検知: 未知のデバイスがあなたの履歴を同期中
                    </p>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                    <h3 className="font-bold mb-4 flex items-center gap-2 text-green-400"><Database size={18} /> 防御プロトコル</h3>
                    <button onClick={() => handleAction('defense')} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold transition-all text-sm">
                      全通信を暗号化・物理遮断
                    </button>
                  </div>
                  <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                    <h3 className="font-bold mb-4 flex items-center gap-2 text-purple-400"><Globe size={18} /> 外部シグナル</h3>
                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Tracing Attack Source...</p>
                    <div className="mt-2 text-xs text-red-500 font-bold">SOURCE IP: 45.xx.xx.12 (Hidden)</div>
                  </div>
                </div>
              </div>

              <div className="space-y-6">
                <div className="bg-slate-800/50 rounded-xl p-6 border border-blue-500/30">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-blue-400"><Send size={20} /> 注意喚起送信</h2>
                  <div className="space-y-2">
                    {['KDDI/NTT/楽天', 'セキュリティ専門機関', '建物管理・オーナー'].map((name) => (
                      <button key={name} onClick={() => handleAction(name)} className="w-full text-left p-3 bg-slate-900 hover:bg-slate-700 border border-slate-700 rounded text-xs font-bold">
                        {name} へ緊急報告
                      </button>
                    ))}
                  </div>
                  {reportSuccess && <div className="mt-4 p-2 bg-green-500/20 border border-green-500/50 rounded text-green-400 text-xs text-center font-bold">送信完了</div>}
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
