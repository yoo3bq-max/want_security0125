<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI GUARDIAN - 通報・警告システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .alert-active { border: 4px solid #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body id="ui-frame" class="min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl">
        <div class="bg-red-900/20 p-4 border-b border-red-900/50 flex justify-between items-center">
            <h1 class="font-bold text-red-500">🛡️ セキュリティ情報機関 連携中</h1>
            <span class="text-xs font-mono text-slate-400">NODE: 127.0.0.1</span>
        </div>

        <div class="p-8">
            <div id="safe-status" class="text-center py-10">
                <div class="text-6xl mb-4 text-green-500">🔒</div>
                <h2 class="text-2xl font-bold">通信は保護されています</h2>
                <p class="text-slate-400 mt-2">キャリア回線の異常送信を24時間監視中</p>
            </div>

            <div id="danger-status" class="hidden text-center py-10">
                <div class="text-6xl mb-4">⚠️</div>
                <h2 class="text-2xl font-bold text-red-500">不審な遠隔通信を検知！</h2>
                <p class="text-white mt-2 font-bold underline">大手キャリア(NTT/KDDI等)へ警告を発令しました</p>
                
                <div class="mt-6 flex flex-col gap-2">
                    <button onclick="alert('IPA（情報セキュリティセンター）へレポートを送信しました')" class="bg-red-600 hover:bg-red-700 p-3 rounded font-bold">行政機関へ緊急通報</button>
                    <button onclick="alert('KDDI/NTT/ドコモの技術部門へ警告を送出しました')" class="bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold">通信会社へ警告送出</button>
                </div>
            </div>

            <div class="mt-8 border-t border-slate-800 pt-6">
                <p class="text-xs text-slate-500 mb-2 font-mono">監視ターゲット:</p>
                <div class="grid grid-cols-2 gap-2 text-[10px] font-mono text-slate-400">
                    <div class="border border-slate-800 p-1">KDDI/au: 正常</div>
                    <div class="border border-slate-800 p-1">NTT/OCN: 正常</div>
                    <div class="border border-slate-800 p-1">Docomo: 正常</div>
                    <div class="border border-slate-800 p-1">Rakuten: 正常</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function check() {
            fetch('http://127.0.0.1:5000/api/stats')
                .then(r => r.json())
                .then(data => {
                    const safe = document.getElementById('safe-status');
                    const danger = document.getElementById('danger-status');
                    const frame = document.getElementById('ui-frame');
                    
                    if (data.alert) {
                        safe.classList.add('hidden');
                        danger.classList.remove('hidden');
                        frame.classList.add('alert-active');
                    } else {
                        safe.classList.remove('hidden');
                        danger.classList.add('hidden');
                        frame.classList.remove('alert-active');
                    }
                });
        }
        setInterval(check, 1000);
    </script>
</body>
</html>
