<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Guardian - Live Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; background-color: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
      .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; animation: scan 3s infinite linear; box-shadow: 0 0 15px #3b82f6; z-index: 50; pointer-events: none; }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      .loading-text { display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #3b82f6; font-family: monospace; }
    </style>
  </head>
  <body>
    <div id="root"><div class="loading-text">セキュア接続を待機中...</div></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Line } = window.Recharts;

      const App = () => {
        const [data, setData] = useState([]);
        const [isLive, setIsLive] = useState(false);

        useEffect(() => {
          window.lucide.createIcons();
          
          // 1秒ごとにローカルサーバー（あなたのPC）からデータを取得
          const interval = setInterval(() => {
            fetch('http://127.0.0.1:5000/api/stats')
              .then(res => res.json())
              .then(stats => {
                setIsLive(true);
                setData(prev => {
                  const newData = [...prev, { time: new Date().toLocaleTimeString(), ...stats }];
                  if (newData.length > 20) return newData.slice(1); // 20件まで表示
                  return newData;
                });
              })
              .catch(err => {
                console.log("Waiting for local server...");
                setIsLive(false);
              });
          }, 1000);
          return () => clearInterval(interval);
        }, []);

        return (
          <div className="min-h-screen p-4 md:p-8">
            <div className="scan-line"></div>
            <header className="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
              <div>
                <h1 className="text-3xl font-bold flex items-center gap-3 text-blue-500 italic">
                  <i data-lucide="shield"></i> AI Signal Guardian
                </h1>
                <p className="text-slate-400 font-mono text-xs mt-1">
                  STATUS: {isLive ? <span className="text-green-500">REAL-TIME LIVE</span> : <span className="text-yellow-500">CONNECTING...</span>}
                </p>
              </div>
            </header>

            <div className="bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-2xl mb-6">
              <h2 className="text-xl font-semibold mb-6 flex items-center gap-2 text-blue-400">
                <i data-lucide="activity"></i> ローカルネットワーク生データ解析
              </h2>
              <div style={{ width: '100%', height: 350 }}>
                <ResponsiveContainer>
                  <AreaChart data={data}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                    <XAxis dataKey="time" stroke="#64748b" fontSize={10} />
                    <YAxis stroke="#64748b" />
                    <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155' }} />
                    <Area type="monotone" dataKey="upload" stroke="#ef4444" fill="#ef4444" fillOpacity={0.1} name="流出疑い (KB/s)" isAnimationActive={false} />
                    <Area type="monotone" dataKey="download" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.1} name="受信 (KB/s)" isAnimationActive={false} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
            
            <div className="p-4 bg-blue-900/20 border border-blue-500/30 rounded-lg text-center">
              <p className="text-blue-400 text-sm font-mono tracking-widest">
                あなたのPCの「monitor.py」から直接データを受信しています
              </p>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
