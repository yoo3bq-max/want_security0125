<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Guardian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; padding: 0; background-color: #0f172a; color: white; font-family: sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { 
        Shield, AlertTriangle, Activity, Smartphone, 
        Monitor, Wifi, Send, CheckCircle2, Lock, Globe 
      } = lucide;
      const { 
        AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Line 
      } = Recharts;

      const trafficData = [
        { time: '10:00', upload: 1.2, download: 5.5 },
        { time: '10:05', upload: 1.5, download: 6.2 },
        { time: '10:10', upload: 15.8, download: 4.1 },
        { time: '10:15', upload: 18.2, download: 3.8 },
        { time: '10:20', upload: 17.5, download: 4.2 },
        { time: '10:25', upload: 1.4, download: 5.9 },
      ];

      function App() {
        const [reporting, setReporting] = useState(false);
        const [reportSuccess, setReportSuccess] = useState(false);

        const handleReport = () => {
          setReporting(true);
          setTimeout(() => {
            setReporting(false);
            setReportSuccess(true);
            setTimeout(() => setReportSuccess(false), 3000);
          }, 1500);
        };

        const alerts = [
          { id: 1, type: 'critical', device: 'iPhone 15 Pro', message: '意図しない画面共有を検知', time: '10:12:45' },
          { id: 2, type: 'warning', device: 'Windows PC', message: '不審なパケット送信', time: '10:05:12' }
        ];

        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 p-4 md:p-8">
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
              <div>
                <h1 className="text-3xl font-bold flex items-center gap-3 text-blue-400">
                  <Shield size={36} /> AI Signal Guardian
                </h1>
                <p className="text-slate-400 mt-1">GitHub Edition: Security Signal Monitor</p>
              </div>
              <div className="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded border border-slate-700 text-green-500">
                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span className="text-sm">System Active</span>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                  <h2 className="text-xl font-semibold mb-6 flex items-center gap-2"><Activity className="text-blue-400" /> 通信パケット解析</h2>
                  <div style={{ width: '100%', height: 300 }}>
                    <ResponsiveContainer>
                      <AreaChart data={trafficData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                        <XAxis dataKey="time" stroke="#94a3b8" />
                        <YAxis stroke="#94a3b8" />
                        <Tooltip contentStyle={{ backgroundColor: '#1e293b', border: 'none' }} />
                        <Area type="monotone" dataKey="upload" stroke="#ef4444" fill="#ef4444" fillOpacity={0.2} />
                        <Line type="monotone" dataKey="download" stroke="#3b82f6" />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                    <h3 className="font-semibold mb-4 flex items-center gap-2"><Smartphone size={18} /> デバイス</h3>
                    <div className="space-y-2">
                      <div className="p-3 bg-red-900/20 border border-red-500/50 rounded flex justify-between">
                        <span>iPhone 15 Pro</span><span className="text-red-400 font-bold">ALERT</span>
                      </div>
                      <div className="p-3 bg-slate-700/30 border border-slate-600 rounded flex justify-between">
                        <span>Work PC</span><span className="text-green-500">SECURE</span>
                      </div>
                    </div>
                  </div>
                  <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 text-xs">
                    <h3 className="font-semibold mb-4 flex items-center gap-2 text-base"><Globe size={18} /> 外部接続</h3>
                    <div className="flex justify-between border-b border-slate-700 py-1">
                      <span>45.xx.xx.12</span><span className="text-red-400">SUSPICIOUS</span>
                    </div>
                    <div className="flex justify-between border-b border-slate-700 py-1">
                      <span>192.168.1.1</span><span className="text-green-400">TRUSTED</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="space-y-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                  <h2 className="text-lg font-bold mb-4 text-red-400">検知アラート</h2>
                  {alerts.map(a => (
                    <div key={a.id} className="mb-3 p-3 bg-slate-900 rounded border-l-4 border-red-500">
                      <div className="flex justify-between text-[10px] text-slate-500"><span>{a.time}</span></div>
                      <p className="text-xs font-bold">{a.device}</p>
                      <p className="text-[10px] text-slate-400">{a.message}</p>
                    </div>
                  ))}
                </div>
                <div className="bg-blue-600 rounded-xl p-6">
                  <h2 className="font-bold mb-2">キャリア報告</h2>
                  <button onClick={handleReport} className="w-full py-2 bg-white text-blue-600 rounded font-bold">
                    {reporting ? '送信中...' : 'レポート送信'}
                  </button>
                  {reportSuccess && <p className="text-center text-xs mt-2">送信完了</p>}
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
